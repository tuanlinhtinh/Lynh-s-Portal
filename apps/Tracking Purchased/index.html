<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubTrack — Subscription Timeline</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #080808;
    --accent: #68e5b4;
    --white: #ffffff;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }





  
  /* LOCK SCREEN */
  #lock-screen {
    position: fixed; inset: 0;
    background: var(--blue);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 0.6s ease;
    padding: 24px;
  }
  #lock-screen::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
  }

  .lock-box {
    text-align: center;
    animation: fadeUp 1s ease forwards;
    width: 100%; max-width: 480px;
  }

  .lock-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 40px;
  }

  .digit-row {
    display: flex;
    gap: clamp(6px, 2vw, 14px);
    justify-content: center;
    margin-bottom: 36px;
  }

  .digit-slot {
    width: clamp(34px, 9.5vw, 52px);
    height: clamp(34px, 9.5vw, 52px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(15px, 4vw, 22px);
    font-weight: 200;
    color: var(--white);
    transition: border-color 0.3s, background 0.3s;
    position: relative; overflow: hidden;
    flex-shrink: 0;
  }
  .digit-slot.active { border-color: var(--accent); background: rgba(74, 212, 104, 0.08); }
  .digit-slot.filled { border-color: rgba(255,255,255,0.45); }
  .digit-slot.error  { border-color: #e05555; animation: shake 0.4s ease; }

  .digit-slot .cursor {
    display: block; width: 1px; height: 55%;
    background: var(--accent);
    animation: blink 1s step-end infinite;
    position: absolute;
  }

  .hidden-input {
    position: absolute; opacity: 0; pointer-events: none;
    width: 1px; height: 1px;
  }

  .lock-hint {
    font-size: 10px; letter-spacing: 0.3em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }






  /* TRANSITION OVERLAY */
  #transition-overlay {
    position: fixed; inset: 0;
    background: var(--blue);
    display: flex; align-items: center; justify-content: center;
    z-index: 90; pointer-events: none; opacity: 0;
  }
  #transition-overlay.active { opacity: 1; pointer-events: all; }

  .reveal-icon {
    width: clamp(80px, 20vw, 120px);
    height: clamp(80px, 20vw, 120px);
    display: flex; align-items: center; justify-content: center;
  }
  .reveal-icon svg { width: 100%; height: 100%; fill: var(--white); transform-origin: center; }
  .reveal-icon.spin-zoom svg {
    animation: spinZoom 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }








  /* KEYFRAMES */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0; }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  @keyframes spinZoom {
    0%   { transform: rotate(0deg)   scale(1);    opacity: 1; }
    60%  { transform: rotate(540deg) scale(1.15); opacity: 1; }
    85%  { transform: rotate(720deg) scale(0.05); opacity: 1; }
    100% { transform: rotate(720deg) scale(0);    opacity: 0; }
  }

  </style>
</head>

<body>

  <div class="bg-grid"></div>

  <div id="lock-screen">
  <div class="lock-box">
    <p class="lock-label">Enter access code</p>
    <div class="digit-row" id="digit-row"></div>
    <p class="lock-hint">8-digit code</p>
  </div>
  <input class="hidden-input" id="hidden-input" type="tel" inputmode="numeric" maxlength="8" autocomplete="off">
  </div>



  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">◈</span>
    
      </div>
      <div class="header-stats">
        <div class="stat">
          <span class="stat-num" id="totalCount">0</span>
          <span class="stat-label">Services</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num" id="dueSoonCount">0</span>
          <span class="stat-label">Due Soon</span>
        </div>
      </div>
      <button class="add-btn" id="openModal">
        <span>+</span> Add Service
      </button>
    </div>
  </header>

  <main>
    <div class="timeline-header">
      <h1>Subscription Timeline</h1>
      <p class="subtitle">Track when your services need renewal</p>
    </div>

    <!-- Cost Summary Panel -->
    <div class="summary-panel" id="summaryPanel" style="display:none">
      <div class="summary-title">
        <span class="summary-icon">◈</span> Cost Summary
        <span class="summary-note" id="summaryNote"></span>
      </div>
      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-period">Monthly</div>
          <div class="summary-amount" id="sumMonthly">—</div>
          <div class="summary-breakdown" id="sumMonthlyBreak"></div>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-card">
          <div class="summary-period">Yearly</div>
          <div class="summary-amount" id="sumYearly">—</div>
          <div class="summary-breakdown" id="sumYearlyBreak"></div>
        </div>
      </div>
    </div>

    <div id="emptyState" class="empty-state">
      <div class="empty-icon">◈</div>
      <p>No subscriptions tracked yet.</p>
      <span>Click "Add Service" to get started.</span>
    </div>

    <div class="cards-grid" id="cardsGrid"></div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Service</h2>
        <button class="modal-close" id="closeModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Service / Website Name</label>
          <input type="text" id="inputName" placeholder="e.g. Netflix, Spotify…" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" id="inputStart" />
          </div>
          <div class="form-group">
            <label>Next Payment Date</label>
            <input type="date" id="inputEnd" />
          </div>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="inputCategory">
            <option value="streaming">🎬 Streaming</option>
            <option value="music">🎵 Music</option>
            <option value="software">💻 Software</option>
            <option value="gaming">🎮 Gaming</option>
            <option value="news">📰 News / Media</option>
            <option value="cloud">☁️ Cloud Storage</option>
            <option value="other">◈ Other</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Cost (optional)</label>
            <input type="number" id="inputCost" placeholder="e.g. 9.99" min="0" step="0.01" />
          </div>
          <div class="form-group">
            <label>Billing Cycle</label>
            <select id="inputBilling">
              <option value="monthly">Monthly</option>
              <option value="yearly">Yearly</option>
              <option value="none">One-time / Other</option>
            </select>
          </div>
        </div>
        <div class="form-error" id="formError"></div>
        <button class="submit-btn" id="submitBtn">Save Service</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
  const SECRET_CODE = '12345678';

  const digitRow    = document.getElementById('digit-row');
  const hiddenInput = document.getElementById('hidden-input');
  const lockScreen  = document.getElementById('lock-screen');
  const overlay     = document.getElementById('transition-overlay');
  const revealIcon  = document.getElementById('reveal-icon');
  const mainSite    = document.getElementById('main-site');

  let entered = '';

  for (let i = 0; i < 8; i++) {
    const slot = document.createElement('div');
    slot.className = 'digit-slot' + (i === 0 ? ' active' : '');
    slot.id = 'slot-' + i;
    if (i === 0) slot.innerHTML = '<span class="cursor"></span>';
    digitRow.appendChild(slot);
  }

  lockScreen.addEventListener('click', () => hiddenInput.focus());
  hiddenInput.focus();

  hiddenInput.addEventListener('input', () => {
    entered = hiddenInput.value.replace(/\D/g, '').slice(0, 8);
    hiddenInput.value = entered;
    updateSlots();
    if (entered.length === 8) validateCode();
  });

  function updateSlots() {
    for (let i = 0; i < 8; i++) {
      const slot = document.getElementById('slot-' + i);
      slot.className = 'digit-slot';
      slot.innerHTML = '';
      if (i < entered.length) {
        slot.classList.add('filled');
        slot.textContent = '•';
      } else if (i === entered.length) {
        slot.classList.add('active');
        slot.innerHTML = '<span class="cursor"></span>';
      }
    }
  }

  function validateCode() {
    if (entered === SECRET_CODE) {
      lockScreen.style.opacity = '0';
      setTimeout(() => {
        lockScreen.style.display = 'none';
        startRevealAnimation();
      }, 500);
    } else {
      for (let i = 0; i < 8; i++)
        document.getElementById('slot-' + i).classList.add('error');
      setTimeout(() => {
        entered = ''; hiddenInput.value = '';
        updateSlots(); hiddenInput.focus();
      }, 700);
    }
  }

  function startRevealAnimation() {
    overlay.classList.add('active');
    revealIcon.classList.add('spin-zoom');
    setTimeout(() => {
      mainSite.classList.add('visible');
      overlay.style.transition = 'opacity 0.5s ease';
      overlay.style.opacity = '0';
      setTimeout(() => { overlay.style.display = 'none'; }, 500);
    }, 2000);
  }

  // CANVAS BACKGROUND
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const orbs = [
    { x: 0.15, y: 0.25, r: 0.55, color: '#0d2a5e', vx:  0.00012, vy:  0.00008 },
    { x: 0.75, y: 0.65, r: 0.50, color: '#0a1e4a', vx: -0.00009, vy:  0.00011 },
    { x: 0.50, y: 0.10, r: 0.45, color: '#112f70', vx:  0.00007, vy:  0.00013 },
    { x: 0.85, y: 0.20, r: 0.40, color: '#0b2355', vx: -0.00011, vy: -0.00007 },
    { x: 0.20, y: 0.80, r: 0.48, color: '#091840', vx:  0.00010, vy: -0.00009 },
    { x: 0.60, y: 0.85, r: 0.42, color: '#15377e', vx: -0.00008, vy: -0.00012 },
  ];
  let t = 0;

  function drawFrame() {
    const W = canvas.width, H = canvas.height;
    t++;
    ctx.fillStyle = '#060e1f';
    ctx.fillRect(0, 0, W, H);
    for (const orb of orbs) {
      const px = (orb.x + Math.sin(t * 0.0003 + orb.r * 10) * 0.08) * W;
      const py = (orb.y + Math.cos(t * 0.0004 + orb.r *  7) * 0.07) * H;
      const radius = orb.r * Math.min(W, H);
      const grad = ctx.createRadialGradient(px, py, 0, px, py, radius);
      grad.addColorStop(0,   orb.color + 'cc');
      grad.addColorStop(0.5, orb.color + '55');
      grad.addColorStop(1,   orb.color + '00');
      ctx.globalCompositeOperation = 'screen';
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
      orb.x += orb.vx; orb.y += orb.vy;
      if (orb.x < 0 || orb.x > 1) orb.vx *= -1;
      if (orb.y < 0 || orb.y > 1) orb.vy *= -1;
    }
    ctx.globalCompositeOperation = 'source-over';
    for (let i = 0; i < 3; i++) {
      const sy    = (Math.sin(t * 0.0002 + i * 2.1) * 0.5 + 0.5) * H;
      const alpha = 0.018 + Math.sin(t * 0.0015 + i) * 0.010;
      const sg    = ctx.createLinearGradient(0, sy - 60, 0, sy + 60);
      sg.addColorStop(0,   'rgba(60,120,220,0)');
      sg.addColorStop(0.5, 'rgba(60,120,220,' + alpha + ')');
      sg.addColorStop(1,   'rgba(60,120,220,0)');
      ctx.fillStyle = sg;
      ctx.fillRect(0, sy - 60, W, 120);
    }
    requestAnimationFrame(drawFrame);
  }
  drawFrame();

  </script>
</body>
</html>
