<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubTrack — Subscription Timeline</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-grid"></div>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">SubTrack</span>
      </div>
      <div class="header-stats">
        <div class="stat">
          <span class="stat-num" id="totalCount">0</span>
          <span class="stat-label">Services</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num" id="dueSoonCount">0</span>
          <span class="stat-label">Due Soon</span>
        </div>
      </div>
      <button class="add-btn" id="openModal">
        <span>+</span> Add Service
      </button>
    </div>
  </header>

  <main>
    <div class="timeline-header">
      <h1>Subscription Timeline</h1>
      <p class="subtitle">Track when your services need renewal</p>
    </div>

    <!-- Cost Summary Panel -->
    <div class="summary-panel" id="summaryPanel" style="display:none">
      <div class="summary-title">
        <span class="summary-icon">◈</span> Cost Summary
        <span class="summary-note" id="summaryNote"></span>
      </div>
      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-period">Monthly</div>
          <div class="summary-amount" id="sumMonthly">—</div>
          <div class="summary-breakdown" id="sumMonthlyBreak"></div>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-card">
          <div class="summary-period">Yearly</div>
          <div class="summary-amount" id="sumYearly">—</div>
          <div class="summary-breakdown" id="sumYearlyBreak"></div>
        </div>
      </div>
    </div>

    <div id="emptyState" class="empty-state">
      <div class="empty-icon">◈</div>
      <p>No subscriptions tracked yet.</p>
      <span>Click "Add Service" to get started.</span>
    </div>

    <div class="cards-grid" id="cardsGrid"></div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Service</h2>
        <button class="modal-close" id="closeModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Service / Website Name</label>
          <input type="text" id="inputName" placeholder="e.g. Netflix, Spotify…" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" id="inputStart" />
          </div>
          <div class="form-group">
            <label>Next Payment Date</label>
            <input type="date" id="inputEnd" />
          </div>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="inputCategory">
            <option value="streaming">🎬 Streaming</option>
            <option value="music">🎵 Music</option>
            <option value="software">💻 Software</option>
            <option value="gaming">🎮 Gaming</option>
            <option value="news">📰 News / Media</option>
            <option value="cloud">☁️ Cloud Storage</option>
            <option value="other">◈ Other</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Cost (optional)</label>
            <input type="number" id="inputCost" placeholder="e.g. 9.99" min="0" step="0.01" />
          </div>
          <div class="form-group">
            <label>Billing Cycle</label>
            <select id="inputBilling">
              <option value="monthly">Monthly</option>
              <option value="yearly">Yearly</option>
              <option value="none">One-time / Other</option>
            </select>
          </div>
        </div>
        <div class="form-error" id="formError"></div>
        <button class="submit-btn" id="submitBtn">Save Service</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
