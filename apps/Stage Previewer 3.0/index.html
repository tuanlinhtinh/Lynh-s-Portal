<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage Previewer 3.0</title>
<link rel="stylesheet" href="theme.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--c-bg); color: var(--c-text); font-family: var(--font-mono); }
  #app { display: flex; width: 100vw; height: 100vh; }

    :root {
    --blue: #080808;
    --accent: #c8ff6e;
    --white: #ffffff;
  }

  /* ── LOADING ────────────────────────────────────────────────────── */
  #loading-screen { position: fixed; inset: 0; background: var(--c-loading-bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  #loading-screen.hidden { display: none; }
  .loading-logo { font-family: var(--font-sans); font-weight: 700; font-size: var(--fs-logo-loading); color: var(--c-accent); letter-spacing: var(--ls-logo-loading); }
  .loading-bar-wrap { width: var(--loading-bar-width); height: var(--loading-bar-height); background: var(--c-border); border-radius: var(--r-loading-bar); overflow: hidden; }
  .loading-bar { height: 100%; background: var(--c-accent); width: 0%; transition: width var(--tr-loading); }
  .loading-msg { font-size: var(--fs-loading-msg); color: var(--c-muted); letter-spacing: var(--ls-loading-msg); }

  /* ── LEFT PANEL ─────────────────────────────────────────────────── */
  #left-panel { width: var(--panel-width); min-width: var(--panel-width); background: var(--c-panel); border-right: var(--bw-standard) solid var(--c-border); display: flex; flex-direction: column; z-index: 10; user-select: none; }
  .panel-header { padding: var(--panel-header-pad); border-bottom: var(--bw-standard) solid var(--c-border); display: flex; align-items: center; justify-content: space-between; }
  .panel-logo { font-family: var(--font-sans); font-weight: 700; font-size: var(--fs-logo); letter-spacing: var(--ls-logo); color: var(--c-accent); }
  .header-btns { display: flex; gap: 5px; }
  .import-btn { display: flex; align-items: center; gap: 4px; font-size: var(--fs-import-btn); font-family: var(--font-mono); letter-spacing: var(--ls-import-btn); color: var(--c-muted); background: transparent; border: var(--bw-standard) solid var(--c-border); border-radius: var(--r-import-btn); padding: var(--import-btn-pad); cursor: pointer; transition: color var(--tr-fast), border-color var(--tr-fast); }
  .import-btn:hover { color: var(--c-accent); border-color: var(--c-accent); }

  /* ── ZONES ──────────────────────────────────────────────────────── */
  .zone { display: flex; flex-direction: column; min-height: 0; border-bottom: var(--bw-standard) solid var(--c-border); }
  #object-zone  { flex: var(--zone-object-flex); }
  #texture-zone { flex: var(--zone-texture-flex); }
  .zone-title { font-size: var(--fs-zone-title); letter-spacing: var(--ls-zone-title); text-transform: uppercase; color: var(--c-muted); padding: var(--zone-title-pad); flex-shrink: 0; }
  .zone-list { flex: 1; overflow-y: auto; padding: var(--zone-list-pad); scrollbar-width: thin; scrollbar-color: var(--c-scrollbar-thumb) transparent; min-height: 0; }

  /* ── OBJECT LIST ────────────────────────────────────────────────── */
  .obj-item { display: flex; align-items: center; gap: var(--obj-item-gap); padding: var(--obj-item-pad); border-radius: var(--r-item); cursor: pointer; font-size: var(--fs-obj-item); color: var(--c-text); transition: background var(--tr-fast), color var(--tr-fast); border: var(--bw-standard) solid transparent; position: relative; }
  .obj-item:hover { background: var(--c-panel2); }
  .obj-item.selected { background: var(--c-accent-sel-bg); border-color: var(--c-accent-sel-border); color: var(--c-accent); }
  .obj-icon { width: var(--icon-obj); height: var(--icon-obj); opacity: var(--opacity-obj-icon); flex-shrink: 0; }
  .obj-item.selected .obj-icon { opacity: var(--opacity-obj-icon-selected); }
  .obj-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .item-del { width: 16px; height: 16px; flex-shrink: 0; display: none; align-items: center; justify-content: center; border-radius: var(--r-item); border: none; background: transparent; color: var(--c-muted); cursor: pointer; font-size: var(--fs-item-del); line-height: 1; transition: color var(--tr-fast), background var(--tr-fast); padding: 0; }
  .obj-item:hover .item-del { display: flex; }
  .item-del:hover { color: var(--c-danger); background: var(--c-danger-bg); }

  /* ── TEXTURE GRID ───────────────────────────────────────────────── */
  .tex-grid { display: grid; grid-template-columns: repeat(var(--tex-grid-columns), 1fr); gap: var(--tex-grid-gap); padding: var(--tex-grid-pad); }
  .tex-thumb { aspect-ratio: 1; border-radius: var(--r-item); overflow: hidden; cursor: pointer; border: var(--bw-tex-thumb) solid transparent; transition: border-color var(--tr-fast); background: var(--c-panel2); position: relative; }
  .tex-thumb:hover { border-color: var(--c-muted); }
  .tex-thumb.selected { border-color: var(--c-accent); }
  .tex-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .tex-label { position: absolute; bottom: 0; left: 0; right: 0; font-size: var(--fs-tex-label); background: var(--c-tex-label-bg); color: var(--c-text); padding: 2px 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tex-type-badge { position: absolute; top: 3px; left: 3px; font-size: var(--fs-tex-badge); background: var(--c-tex-badge-bg); color: var(--c-accent); padding: 1px 3px; border-radius: var(--r-item); }
  .tex-del { position: absolute; top: 3px; right: 3px; width: 16px; height: 16px; border-radius: var(--r-item); border: none; background: var(--c-tex-del-bg); color: var(--c-muted); cursor: pointer; font-size: var(--fs-tex-del); line-height: 1; display: none; align-items: center; justify-content: center; padding: 0; transition: color var(--tr-fast); }
  .tex-thumb:hover .tex-del { display: flex; }
  .tex-del:hover { color: var(--c-danger); }

  /* ── BUTTONS ────────────────────────────────────────────────────── */
  #btn-zone { flex: 0 0 auto; padding: var(--btn-zone-pad); display: flex; flex-direction: column; gap: var(--btn-zone-gap); border-top: var(--bw-standard) solid var(--c-border); }
  .action-btn { width: 100%; padding: var(--action-btn-pad); border-radius: var(--r-item); border: var(--bw-standard) solid var(--c-border); background: var(--c-panel2); color: var(--c-text); font-family: var(--font-mono); font-size: var(--fs-action-btn); letter-spacing: var(--ls-action-btn); cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background var(--tr-fast), border-color var(--tr-fast), color var(--tr-fast); }
  .action-btn:hover { background: var(--c-panel); border-color: var(--c-accent); color: var(--c-accent); }
  .action-btn.accent { border-color: var(--c-accent-btn-border); color: var(--c-accent); }
  #color-swatch { width: var(--icon-color-swatch); height: var(--icon-color-swatch); border-radius: var(--r-color-swatch); background: var(--c-default-mesh); border: var(--bw-standard) solid var(--c-border); flex-shrink: 0; }

  /* ── VIEWPORT ───────────────────────────────────────────────────── */
  #viewport { flex: 1; position: relative; overflow: hidden; background: var(--c-bg); }
  #canvas { display: block; width: 100%; height: 100%; }
  #drop-overlay { position: absolute; inset: 0; background: var(--c-drop-overlay-bg); border: var(--bw-drop) dashed var(--c-drop-overlay-border); display: none; align-items: center; justify-content: center; z-index: 50; pointer-events: none; }
  #drop-overlay.active { display: flex; }
  .drop-msg { font-family: var(--font-sans); font-size: var(--fs-drop-msg); color: var(--c-accent); letter-spacing: var(--ls-drop-msg); text-align: center; }
  .drop-sub { font-size: var(--fs-drop-sub); opacity: var(--opacity-drop-sub); }
  #watermark { position: absolute; bottom: var(--watermark-bottom); right: var(--watermark-right); font-size: var(--fs-watermark); color: var(--c-watermark); letter-spacing: var(--ls-watermark); pointer-events: none; z-index: 5; }
  #hdri-hint { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); font-size: var(--fs-hdri-hint); color: var(--c-hdri-hint); letter-spacing: var(--ls-hdri-hint); pointer-events: none; z-index: 5; white-space: nowrap; }
  #status { position: absolute; bottom: var(--status-bottom); left: 50%; transform: translateX(-50%); font-size: var(--fs-status); color: var(--c-muted); background: var(--c-status-bg); padding: 4px 14px; border-radius: var(--r-status); border: var(--bw-standard) solid var(--c-border); pointer-events: none; z-index: 20; opacity: 0; transition: opacity var(--tr-status); white-space: nowrap; }
  #status.visible { opacity: 1; }

  /* ── VIDEO BAR ──────────────────────────────────────────────────── */
  #video-bar { position: absolute; bottom: 0; left: 0; right: 0; height: var(--videobar-height); background: linear-gradient(to top, var(--c-videobar-bg-dark), var(--c-videobar-bg-light)); border-top: var(--bw-standard) solid var(--c-videobar-border); display: flex; align-items: center; gap: var(--videobar-gap); padding: var(--videobar-pad); z-index: 15; opacity: 0; pointer-events: none; transition: opacity var(--tr-videobar); }
  #video-bar.visible { opacity: 1; pointer-events: all; }
  .vbar-btn { width: var(--icon-vbar-btn); height: var(--icon-vbar-btn); flex-shrink: 0; border-radius: var(--r-vbar-btn); background: var(--c-vbar-btn-bg); border: var(--bw-standard) solid var(--c-vbar-btn-border); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background var(--tr-medium); padding: 0; }
  .vbar-btn:hover { background: var(--c-vbar-btn-hover); }
  .vbar-btn svg { fill: var(--c-accent); }
  #video-name { font-size: var(--fs-video-name); color: var(--c-muted); flex-shrink: 0; max-width: var(--video-name-maxw); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #scrubber-wrap { flex: 1; height: var(--scrubber-height); display: flex; align-items: center; cursor: pointer; position: relative; }
  #scrubber-track { width: 100%; height: var(--scrubber-track-h); border-radius: var(--r-scrubber); background: var(--c-scrubber-track); position: relative; transition: height var(--tr-fast); }
  #scrubber-wrap:hover #scrubber-track { height: var(--scrubber-track-h-hov); }
  #scrubber-fill { height: 100%; border-radius: var(--r-scrubber); background: var(--c-accent); width: 0%; pointer-events: none; }
  #scrubber-thumb { position: absolute; top: 50%; width: var(--scrubber-thumb-size); height: var(--scrubber-thumb-size); border-radius: 50%; background: var(--c-accent); transform: translate(-50%, -50%); left: 0%; pointer-events: none; box-shadow: 0 0 7px var(--c-scrubber-glow); }
  #time-display { font-size: var(--fs-time-display); color: var(--c-muted); flex-shrink: 0; min-width: var(--time-display-minw); text-align: right; }
  #vol-wrap { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  #vol-slider { -webkit-appearance: none; appearance: none; width: var(--vol-slider-width); height: var(--vol-slider-h); border-radius: var(--r-scrubber); background: var(--c-vol-track); outline: none; cursor: pointer; }
  #vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: var(--vol-slider-thumb); height: var(--vol-slider-thumb); border-radius: 50%; background: var(--c-accent); cursor: pointer; }

  #hidden-color, #file-input { display: none; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--c-scrollbar-thumb); border-radius: var(--r-scrubber); }
  .empty-hint { font-size: var(--fs-empty-hint); color: var(--c-muted); padding: 8px 16px; line-height: 1.7; }


</style>
</head>
<body>


<div id="loading-screen">
  <div class="loading-logo">ENTERSPACE</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
  <div class="loading-msg" id="loading-msg">INITIALISING…</div>
</div>

<div id="app">
  <div id="left-panel">
    <div class="panel-header">
      <span class="panel-logo">ENTERSPACE</span>
      <button class="import-btn" id="btn-save-project" style="color:var(--c-accent);border-color:rgba(200,255,110,0.35)">↓ SAVE</button>
    </div>

    <div class="zone" id="object-zone">
      <div class="zone-title">Objects</div>
      <div class="zone-list" id="obj-list">
        <div class="empty-hint">Drag .obj files onto viewport</div>
      </div>
    </div>

    <div class="zone" id="texture-zone">
      <div class="zone-title">Textures</div>
      <div class="zone-list" id="tex-list">
        <div class="empty-hint">Drag .jpg / .png / .mp4<br>onto viewport</div>
      </div>
    </div>

    <div id="btn-zone">
      <button class="action-btn" id="btn-color"><div id="color-swatch"></div>CHANGE COLOR</button>
      <button class="action-btn accent" id="btn-capture">
        <svg style="width:12px;height:12px;flex-shrink:0" viewBox="0 0 12 12" fill="none">
          <rect x="1" y="2.5" width="10" height="8" rx="1.2" stroke="currentColor" stroke-width="1"/>
          <circle cx="6" cy="6.5" r="2" stroke="currentColor" stroke-width="1"/>
          <path d="M4 2.5L4.8 1h2.4L8 2.5" stroke="currentColor" stroke-width="1"/>
        </svg>CAPTURE
      </button>
    </div>
  </div>

  <div id="viewport">
    <canvas id="canvas"></canvas>
    <div id="drop-overlay">
      <div class="drop-msg">DROP FILES HERE<br><span class="drop-sub">.obj · .jpg · .png · .mp4 · .enterspace</span></div>
    </div>
    <div id="hdri-hint">LEFT — Orbit &nbsp;|&nbsp; RIGHT/MID — Pan &nbsp;|&nbsp; SCROLL — Zoom &nbsp;|&nbsp; CTRL+MID — Rotate HDRI</div>
    <div id="watermark">By Lynh / @EnterSpace</div>
    <div id="status"></div>

    <div id="video-bar">
      <button class="vbar-btn" id="btn-playpause">
        <svg id="icon-play" style="width:10px;height:12px" viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg>
        <svg id="icon-pause" style="width:10px;height:12px;display:none" viewBox="0 0 10 12"><rect x="0" y="0" width="3.5" height="12"/><rect x="6.5" y="0" width="3.5" height="12"/></svg>
      </button>
      <span id="video-name">—</span>
      <div id="scrubber-wrap"><div id="scrubber-track"><div id="scrubber-fill"></div><div id="scrubber-thumb"></div></div></div>
      <span id="time-display">0:00 / 0:00</span>
      <div id="vol-wrap">
        <button class="vbar-btn" id="btn-mute">
          <svg id="icon-vol" style="width:12px;height:12px" viewBox="0 0 14 14"><path d="M1 5h3L8 2v10L4 8H1z" fill="currentColor"/><path d="M10 4.5c1 .9 1.6 2.1 1.6 3.1S11 9.7 10 10.6" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/><path d="M12 2.5c1.5 1.4 2.4 3.2 2.4 4.6s-.9 3.2-2.4 4.6" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
          <svg id="icon-muted" style="width:12px;height:12px;display:none" viewBox="0 0 14 14"><path d="M1 5h3L8 2v10L4 8H1z" fill="currentColor"/><line x1="10" y1="5" x2="14" y2="9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="14" y1="5" x2="10" y2="9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
        <input type="range" id="vol-slider" min="0" max="1" step="0.02" value="1">
      </div>
    </div>
  </div>
</div>

<input type="color" id="hidden-color" value="#404044">
<input type="file" id="file-input" multiple accept=".obj,.jpg,.jpeg,.png,.webp,.mp4,.webm,.mov,.enterspace">

<!-- JSZip for project save/load -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

if (typeof THREE === 'undefined') {
  document.getElementById('loading-msg').textContent = 'ERROR: Three.js failed to load. Open locally with internet.';
  document.getElementById('loading-bar').style.background = '#ff6e6e';
  throw new Error('THREE not defined');
}

const loadingBar = document.getElementById('loading-bar');
const loadingMsg = document.getElementById('loading-msg');
function setProgress(pct, msg) { loadingBar.style.width = pct + '%'; if (msg) loadingMsg.textContent = msg; }
setProgress(20, 'BUILDING RENDERER…');

const T = getComputedStyle(document.documentElement);
function tv(n) { return T.getPropertyValue(n).trim(); }

// ── RENDERER ──────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
let renderer;
try { renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true }); }
catch(e) { loadingMsg.textContent = 'WebGL not supported.'; throw e; }
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = parseFloat(tv('--tone-mapping-exposure')) || 1.0;
renderer.outputEncoding = THREE.sRGBEncoding;

setProgress(35, 'BUILDING SCENE…');

const scene = new THREE.Scene();
scene.background = new THREE.Color(tv('--scene-bg') || '#141414');

// ── B&W ENV MAP ───────────────────────────────────────────────────
(function() {
  const W=512, H=256, c=document.createElement('canvas'); c.width=W; c.height=H;
  const ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#c8c8c8'); g.addColorStop(0.38,'#888'); g.addColorStop(0.5,'#505050'); g.addColorStop(1,'#0e0e0e');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const s=ctx.createRadialGradient(W*.62,H*.28,0,W*.62,H*.28,W*.11);
  s.addColorStop(0,'rgba(255,255,255,0.9)'); s.addColorStop(0.4,'rgba(200,200,200,0.25)'); s.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=s; ctx.fillRect(0,0,W,H);
  const img=new Image();
  img.onload=()=>{ const t=new THREE.Texture(img); t.mapping=THREE.EquirectangularReflectionMapping; t.encoding=THREE.sRGBEncoding; t.needsUpdate=true; scene.environment=t; };
  img.src=c.toDataURL();
})();

// ── CAMERA ────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(
  parseFloat(tv('--camera-fov'))||40, 1,
  parseFloat(tv('--camera-near'))||0.01,
  parseFloat(tv('--camera-far'))||1000
);
camera.position.set(0, 1.2, 4); camera.lookAt(0, 0, 0);

// ── LIGHTING ──────────────────────────────────────────────────────
const lightGroup = new THREE.Group(); scene.add(lightGroup);
const ambient = new THREE.AmbientLight(0xffffff, parseFloat(tv('--ambient-intensity'))||0.55); lightGroup.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, parseFloat(tv('--sun-intensity'))||1.8);
sun.position.set(4,8,5); sun.castShadow=true;
const sms=parseInt(tv('--shadow-map-size'))||2048; sun.shadow.mapSize.set(sms,sms);
sun.shadow.camera.near=0.1; sun.shadow.camera.far=50; sun.shadow.camera.left=-10; sun.shadow.camera.right=10; sun.shadow.camera.top=10; sun.shadow.camera.bottom=-10; sun.shadow.bias=-0.001;
lightGroup.add(sun);
const fill=new THREE.DirectionalLight(0xaaaaaa,parseFloat(tv('--fill-intensity'))||0.4); fill.position.set(-4,2,-3); lightGroup.add(fill);
const rim=new THREE.DirectionalLight(0xcccccc,parseFloat(tv('--rim-intensity'))||0.25); rim.position.set(2,-1,-5); lightGroup.add(rim);

setProgress(55, 'SETTING UP CONTROLS…');

// ── RESIZE ────────────────────────────────────────────────────────
const viewport = document.getElementById('viewport');
function resize() {
  const w=viewport.clientWidth, h=viewport.clientHeight;
  renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix();
}
resize(); window.addEventListener('resize', resize);

// ── ORBIT ─────────────────────────────────────────────────────────
let orb={active:false,type:null,lx:0,ly:0};
let sph={theta:0.4,phi:1.1,radius:4};
let pan=new THREE.Vector3(0,0.5,0);
let lTheta=0,lPhi=0;
function updateCam() {
  camera.position.set(
    sph.radius*Math.sin(sph.phi)*Math.sin(sph.theta)+pan.x,
    sph.radius*Math.cos(sph.phi)+pan.y,
    sph.radius*Math.sin(sph.phi)*Math.cos(sph.theta)+pan.z
  ); camera.lookAt(pan);
}
updateCam();
viewport.addEventListener('mousedown',e=>{
  orb.lx=e.clientX; orb.ly=e.clientY; orb.active=true;
  if(e.button===0) orb.type='orbit';
  else if(e.button===1){ e.preventDefault(); orb.type=e.ctrlKey?'light':'pan'; }
  else if(e.button===2) orb.type='pan';
});
window.addEventListener('mouseup',()=>{ orb.active=false; orb.type=null; });
window.addEventListener('mousemove',e=>{
  if(!orb.active) return;
  const dx=e.clientX-orb.lx, dy=e.clientY-orb.ly;
  orb.lx=e.clientX; orb.ly=e.clientY;
  if(orb.type==='orbit'){ sph.theta-=dx*0.007; sph.phi=Math.max(0.05,Math.min(Math.PI-0.05,sph.phi-dy*0.007)); updateCam(); }
  else if(orb.type==='pan'){
    const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
    const right=new THREE.Vector3().crossVectors(dir,camera.up).normalize();
    const ps=sph.radius*0.001;
    pan.addScaledVector(right,-dx*ps); pan.addScaledVector(new THREE.Vector3(0,1,0),dy*ps); updateCam();
  } else if(orb.type==='light'){
    lTheta-=dx*0.01; lPhi=Math.max(-1.2,Math.min(1.2,lPhi+dy*0.01));
    lightGroup.rotation.y=lTheta; lightGroup.rotation.x=lPhi;
  }
});
viewport.addEventListener('wheel',e=>{ e.preventDefault(); sph.radius=Math.max(0.3,Math.min(100,sph.radius*(1+e.deltaY*0.001))); updateCam(); },{passive:false});
viewport.addEventListener('contextmenu',e=>e.preventDefault());

setProgress(70, 'READY…');

// ── STATE ─────────────────────────────────────────────────────────
const objects  = {};   // key -> { mesh, isLED, baseColor, objText, appliedTex }
const textures = {};   // name -> { type, tex, url, videoEl?, hasRVFC? }
let selectedObj = null;

// ── OBJ PARSER ────────────────────────────────────────────────────
function parseOBJMulti(text) {
  const vp=[],vt=[],vn=[],groups=[]; let cur=null;
  for(const raw of text.split('\n')){
    const l=raw.trim(); if(!l||l[0]==='#') continue;
    const p=l.split(/\s+/);
    if(p[0]==='v') vp.push(+p[1],+p[2],+p[3]);
    else if(p[0]==='vt') vt.push(+p[1],+p[2]);
    else if(p[0]==='vn') vn.push(+p[1],+p[2],+p[3]);
    else if(p[0]==='o'||p[0]==='g'){
      const nm=p.slice(1).join('_')||('mesh_'+groups.length);
      if(!cur||cur.faces.length>0){ cur={name:nm,faces:[]}; groups.push(cur); } else cur.name=nm;
    } else if(p[0]==='f'){
      if(!cur){ cur={name:'mesh_0',faces:[]}; groups.push(cur); }
      const vs=p.slice(1).map(s=>{ const t=s.split('/'); return{p:+t[0]-1,t:t[1]?+t[1]-1:-1,n:t[2]?+t[2]-1:-1}; });
      for(let i=1;i<vs.length-1;i++) cur.faces.push(vs[0],vs[i],vs[i+1]);
    }
  }
  const filled=groups.filter(g=>g.faces.length>0); if(!filled.length) return [];
  const built=filled.map(g=>{
    const n=g.faces.length;
    const pos=new Float32Array(n*3),uvs=new Float32Array(n*2),norm=new Float32Array(n*3);
    for(let i=0;i<n;i++){
      const f=g.faces[i];
      pos[i*3]=vp[f.p*3]; pos[i*3+1]=vp[f.p*3+1]; pos[i*3+2]=vp[f.p*3+2];
      if(f.t>=0&&vt.length){ uvs[i*2]=vt[f.t*2]; uvs[i*2+1]=vt[f.t*2+1]; }
      if(f.n>=0&&vn.length){ norm[i*3]=vn[f.n*3]; norm[i*3+1]=vn[f.n*3+1]; norm[i*3+2]=vn[f.n*3+2]; }
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    if(vt.length) geo.setAttribute('uv',new THREE.BufferAttribute(uvs,2));
    if(vn.length) geo.setAttribute('normal',new THREE.BufferAttribute(norm,3));
    else geo.computeVertexNormals();
    geo.computeBoundingBox(); return{name:g.name,geo};
  });
  const globalBox=new THREE.Box3(); built.forEach(b=>globalBox.union(b.geo.boundingBox));
  const gSize=new THREE.Vector3(); globalBox.getSize(gSize);
  const S=Math.max(gSize.x,gSize.y,gSize.z)>0?2/Math.max(gSize.x,gSize.y,gSize.z):1;
  const gCentre=new THREE.Vector3(); globalBox.getCenter(gCentre);
  const gMinY=globalBox.min.y;
  return built.map(b=>({name:b.name,geo:b.geo,S,ox:-gCentre.x*S,oy:-gMinY*S,oz:-gCentre.z*S}));
}

function loadOBJ(fileName, text, colorOverride, texOverride) {
  const entries=parseOBJMulti(text);
  if(!entries.length){ showStatus('No geometry in '+fileName); return; }
  entries.forEach(({name,geo,S,ox,oy,oz})=>{
    const key=entries.length===1?fileName:fileName+'/'+name;
    const isLED=key.toUpperCase().includes('LED');
    const LED_COLOR = '#FFFFFF';
    const defaultColor = isLED ? LED_COLOR : (colorOverride || tv('--c-default-mesh') || '#404044');
    const mat = isLED
      ? new THREE.MeshBasicMaterial({ color: new THREE.Color(defaultColor) })
      : new THREE.MeshPhongMaterial({ color: new THREE.Color(defaultColor), specular: 0x252528, shininess: 24 });
    const mesh=new THREE.Mesh(geo,mat);
    mesh.scale.setScalar(S); mesh.position.set(ox,oy,oz);
    mesh.castShadow=true; mesh.receiveShadow=true; scene.add(mesh);
    if(objects[key]){ scene.remove(objects[key].mesh); objects[key].mesh.geometry.dispose(); objects[key].mesh.material.dispose(); }
    objects[key]={ mesh, isLED, baseColor:defaultColor, objText:text, appliedTex: texOverride||null };
    addObjToPanel(key);
    // Restore applied texture if provided (called after textures are loaded)
    if(texOverride && textures[texOverride]) {
      mesh.material.map=textures[texOverride].tex;
      mesh.material.needsUpdate=true;
    }
  });
  showStatus('Loaded '+fileName+(entries.length>1?' ('+entries.length+' meshes)':''));
}

// ── LOAD IMAGE TEXTURE ────────────────────────────────────────────
function loadImageTex(name, url) {
  return new Promise(resolve=>{
    new THREE.TextureLoader().load(url, tex=>{
      tex.encoding=THREE.sRGBEncoding; tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
      textures[name]={type:'image',tex,url};
      addTexToPanel(name,'image',url);
      showStatus('Texture: '+name);
      resolve();
    });
  });
}

// ── LOAD VIDEO TEXTURE ────────────────────────────────────────────
function loadVideoTex(name, url) {
  return new Promise(resolve=>{
    const video=document.createElement('video');
    video.playsInline=true; video.loop=true; video.volume=1; video.preload='auto';
    video.addEventListener('loadeddata',()=>{
      const tex=new THREE.VideoTexture(video);
      tex.encoding=THREE.sRGBEncoding; tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
      tex.generateMipmaps=false; tex.minFilter=THREE.LinearFilter;
      const hasRVFC=typeof video.requestVideoFrameCallback==='function';
      function scheduleFrame(){ if(!hasRVFC) return; video.requestVideoFrameCallback(()=>{ tex.needsUpdate=true; if(!video.paused) scheduleFrame(); }); }
      video.addEventListener('play',()=>scheduleFrame());
      video.addEventListener('seeked',()=>{ tex.needsUpdate=true; });
      textures[name]={type:'video',tex,url,videoEl:video,hasRVFC};
      const tc=document.createElement('canvas'); tc.width=80; tc.height=80;
      const ctx2d=tc.getContext('2d');
      const grabThumb=()=>{ try{ ctx2d.drawImage(video,0,0,80,80); }catch(e){} addTexToPanel(name,'video',tc.toDataURL()); resolve(); };
      if(video.readyState>=2) grabThumb();
      else{ video.addEventListener('seeked',grabThumb,{once:true}); video.currentTime=0.001; }
      showStatus('Video: '+name);
    },{once:true});
    video.addEventListener('error',()=>{ showStatus('Video error: '+name); resolve(); },{once:true});
    video.src=url; video.load();
  });
}

// ── PANEL: Objects ────────────────────────────────────────────────
function addObjToPanel(key) {
  const list=document.getElementById('obj-list');
  list.querySelectorAll('.empty-hint').forEach(e=>e.remove());
  if(list.querySelector('[data-obj="'+CSS.escape(key)+'"]')) return;
  const label=key.includes('/')?key.split('/').pop():key;
  const item=document.createElement('div'); item.className='obj-item'; item.dataset.obj=key;
  item.innerHTML=`<svg class="obj-icon" viewBox="0 0 16 16" fill="none"><polygon points="8,1 15,5 15,11 8,15 1,11 1,5" stroke="currentColor" stroke-width="1.2" fill="none"/><line x1="8" y1="1" x2="8" y2="15" stroke="currentColor" stroke-width="0.7" opacity="0.4"/><line x1="1" y1="5" x2="15" y2="5" stroke="currentColor" stroke-width="0.7" opacity="0.4"/><line x1="1" y1="11" x2="15" y2="11" stroke="currentColor" stroke-width="0.7" opacity="0.4"/></svg><span class="obj-name" title="${key}">${label}</span><button class="item-del" title="Delete">✕</button>`;
  item.addEventListener('click',e=>{ if(!e.target.classList.contains('item-del')) selectObj(key); });
  item.querySelector('.item-del').addEventListener('click',e=>{ e.stopPropagation(); deleteObj(key); });
  list.appendChild(item);
}
function selectObj(key) {
  selectedObj=key;
  document.querySelectorAll('.obj-item').forEach(el=>el.classList.toggle('selected',el.dataset.obj===key));
  if(objects[key]) document.getElementById('color-swatch').style.background=objects[key].baseColor;
}
function deleteObj(key) {
  const entry=objects[key]; if(!entry) return;
  scene.remove(entry.mesh); entry.mesh.geometry.dispose(); entry.mesh.material.dispose();
  delete objects[key];
  const el=document.querySelector('[data-obj="'+CSS.escape(key)+'"]'); if(el) el.remove();
  if(selectedObj===key) selectedObj=null;
  if(!document.querySelector('[data-obj]'))
    document.getElementById('obj-list').innerHTML='<div class="empty-hint">Drag .obj files onto viewport</div>';
  showStatus('Deleted: '+key);
}

// ── PANEL: Textures ───────────────────────────────────────────────
function addTexToPanel(name, type, thumbSrc) {
  const list=document.getElementById('tex-list');
  list.querySelectorAll('.empty-hint').forEach(e=>e.remove());
  let grid=list.querySelector('.tex-grid');
  if(!grid){ grid=document.createElement('div'); grid.className='tex-grid'; list.appendChild(grid); }
  if(grid.querySelector('[data-tex="'+CSS.escape(name)+'"]')) return;
  const thumb=document.createElement('div'); thumb.className='tex-thumb'; thumb.dataset.tex=name;
  const img=document.createElement('img'); img.alt=name; img.src=thumbSrc||''; thumb.appendChild(img);
  if(type==='video'){ const b=document.createElement('div'); b.className='tex-type-badge'; b.textContent='MP4'; thumb.appendChild(b); }
  const lbl=document.createElement('div'); lbl.className='tex-label'; lbl.textContent=name; thumb.appendChild(lbl);
  const del=document.createElement('button'); del.className='tex-del'; del.textContent='✕'; del.title='Delete';
  del.addEventListener('click',e=>{ e.stopPropagation(); deleteTex(name); }); thumb.appendChild(del);
  thumb.addEventListener('click',()=>applyTex(name,thumb)); grid.appendChild(thumb);
}
function deleteTex(name) {
  const entry=textures[name]; if(!entry) return;
  if(entry.type==='video'){ if(entry.videoEl){ entry.videoEl.pause(); entry.videoEl.src=''; } if(currentVideo===entry.videoEl) hideVideoBar(); }
  entry.tex.dispose(); delete textures[name];
  const el=document.querySelector('[data-tex="'+CSS.escape(name)+'"]'); if(el) el.remove();
  if(!document.querySelector('.tex-thumb')){ const g=document.querySelector('.tex-grid'); if(g) g.remove(); document.getElementById('tex-list').innerHTML='<div class="empty-hint">Drag .jpg / .png / .mp4<br>onto viewport</div>'; }
  showStatus('Deleted: '+name);
}

// ── APPLY TEXTURE ─────────────────────────────────────────────────
let activeVideoEl = null;
function applyTex(texName, thumbEl) {
  document.querySelectorAll('.tex-thumb').forEach(el=>el.classList.toggle('selected',el===thumbEl));
  if(!selectedObj){ showStatus('Select an object first'); return; }
  const obj=objects[selectedObj]; if(!obj) return;
  const entry=textures[texName]; if(!entry) return;
  if(activeVideoEl&&activeVideoEl!==entry.videoEl) activeVideoEl.pause();
  obj.mesh.material.map=entry.tex; obj.mesh.material.needsUpdate=true;
  obj.appliedTex=texName;
  if(entry.type==='video'){
    activeVideoEl=entry.videoEl; entry.videoEl.currentTime=0; entry.videoEl.pause(); entry.tex.needsUpdate=true;
    showVideoBar(texName,entry.videoEl); showStatus('Video → '+selectedObj);
  } else { activeVideoEl=null; hideVideoBar(); showStatus(texName+' → '+selectedObj); }
}

// ── ═══════════════════════════════════════════════════════════════
//    PROJECT SAVE / LOAD  (.enterspace = EnterSpace Project, a ZIP)
// ── ═══════════════════════════════════════════════════════════════

// SAVE ─────────────────────────────────────────────────────────────
async function saveProject() {
  if(typeof JSZip === 'undefined'){ showStatus('JSZip not loaded — need internet on first open'); return; }
  showStatus('Saving project…');

  const zip = new JSZip();
  const manifest = {
    version: 1,
    camera: { theta:sph.theta, phi:sph.phi, radius:sph.radius, panX:pan.x, panY:pan.y, panZ:pan.z },
    meshes: [],      // { key, file, color, appliedTex }
    textures: [],    // { name, file, type }
    texAssignments: {}  // objKey -> texName
  };

  // ── Pack meshes ──────────────────────────────────────────────────
  // We store the original OBJ text. Each unique "source file" is stored once.
  const savedObjFiles = new Set();
  for(const [key, entry] of Object.entries(objects)) {
    // The source file name is the part before '/' (or the full key if no slash)
    const srcFile = key.includes('/') ? key.split('/')[0] : key;
    const fname = 'meshes/' + srcFile + '.obj';
    if(!savedObjFiles.has(fname) && entry.objText) {
      zip.file(fname, entry.objText);
      savedObjFiles.add(fname);
    }
    manifest.meshes.push({
      key,
      file: fname,
      isLED: entry.isLED || false,
      color: entry.baseColor,
      appliedTex: entry.appliedTex || null,
    });
    if(entry.appliedTex) manifest.texAssignments[key] = entry.appliedTex;
  }

  // ── Pack textures ────────────────────────────────────────────────
  for(const [name, entry] of Object.entries(textures)) {
    if(entry.type === 'video') {
      // Video files can be very large — store a reference note, not the actual blob
      // (browsers can't re-blob a video element back to ArrayBuffer reliably)
      manifest.textures.push({ name, type:'video', note:'video_not_embedded' });
      continue;
    }
    // Image: fetch the blob-URL back as ArrayBuffer
    try {
      const resp = await fetch(entry.url);
      const buf  = await resp.arrayBuffer();
      // Detect extension from url or mime
      const ext  = entry.url.split('.').pop().split('?')[0] || 'png';
      const fname = 'textures/' + name + '.' + ext;
      zip.file(fname, buf);
      manifest.textures.push({ name, type:'image', file: fname });
    } catch(e) {
      manifest.textures.push({ name, type:'image', note:'blob_unreadable' });
    }
  }

  zip.file('project.json', JSON.stringify(manifest, null, 2));

  const blob = await zip.generateAsync({ type:'blob', compression:'DEFLATE', compressionOptions:{ level:6 } });
  const a = document.createElement('a');
  a.download = 'project.enterspace';
  a.href = URL.createObjectURL(blob);
  a.click();
  showStatus('Project saved as project.enterspace');
}

// LOAD ─────────────────────────────────────────────────────────────
async function loadProject(file) {
  if(typeof JSZip === 'undefined'){ showStatus('JSZip not loaded'); return; }
  showStatus('Loading project…');

  let zip;
  try { zip = await JSZip.loadAsync(file); }
  catch(e) { showStatus('Invalid .enterspace file'); return; }

  const projectFile = zip.file('project.json');
  if(!projectFile){ showStatus('Missing project.json in .enterspace'); return; }

  const manifest = JSON.parse(await projectFile.async('string'));
  if(!manifest.version){ showStatus('Unknown project format'); return; }

  // ── Clear current scene ──────────────────────────────────────────
  for(const key of Object.keys(objects)) deleteObj(key);
  for(const name of Object.keys(textures)) deleteTex(name);

  // ── Restore camera ───────────────────────────────────────────────
  if(manifest.camera){
    const c=manifest.camera;
    sph.theta=c.theta||0.4; sph.phi=c.phi||1.1; sph.radius=c.radius||4;
    pan.set(c.panX||0, c.panY||0.5, c.panZ||0);
    updateCam();
  }

  // ── Load textures first (meshes may reference them) ──────────────
  const texLoadPromises = [];
  for(const td of (manifest.textures||[])) {
    if(td.type==='image' && td.file) {
      const zf = zip.file(td.file);
      if(zf) {
        texLoadPromises.push((async()=>{
          const buf  = await zf.async('arraybuffer');
          const ext  = td.file.split('.').pop();
          const mime = ext==='jpg'||ext==='jpeg' ? 'image/jpeg' : ext==='png' ? 'image/png' : 'image/'+ext;
          const blob = new Blob([buf],{type:mime});
          const url  = URL.createObjectURL(blob);
          await loadImageTex(td.name, url);
        })());
      }
    }
    if(td.type==='video') {
      showStatus('Note: videos must be re-imported manually');
    }
  }
  await Promise.all(texLoadPromises);

  // ── Load meshes ──────────────────────────────────────────────────
  // Group by source file to avoid parsing the same OBJ twice
  const objFileCache = {};
  for(const md of (manifest.meshes||[])) {
    if(!objFileCache[md.file]) {
      const zf = zip.file(md.file);
      if(zf) objFileCache[md.file] = await zf.async('string');
    }
  }
  // Load unique source OBJ files — pass null for color, we apply per-mesh below
  const loadedSrcFiles = new Set();
  for(const md of (manifest.meshes||[])) {
    const srcFile = md.key.includes('/') ? md.key.split('/')[0] : md.key;
    if(!loadedSrcFiles.has(md.file) && objFileCache[md.file]) {
      loadedSrcFiles.add(md.file);
      loadOBJ(srcFile, objFileCache[md.file], null, null);
    }
  }
  // Now apply per-mesh colours and texture assignments
  for(const md of (manifest.meshes||[])) {
    const entry = objects[md.key];
    if(!entry) continue;
    // Only restore color on non-LED meshes — LED keeps its bright unlit colour
    if(md.color && !entry.isLED) {
      entry.baseColor = md.color;
      entry.mesh.material.color.set(md.color);
      if(selectedObj===md.key) document.getElementById('color-swatch').style.background=md.color;
    }
    if(md.appliedTex && textures[md.appliedTex]) {
      entry.appliedTex = md.appliedTex;
      entry.mesh.material.map = textures[md.appliedTex].tex;
      entry.mesh.material.needsUpdate = true;
      const thumb = document.querySelector('[data-tex="'+CSS.escape(md.appliedTex)+'"]');
      if(thumb) thumb.classList.add('selected');
    }
  }

  showStatus('Project loaded ✓');
}

// ── BUTTONS ───────────────────────────────────────────────────────
document.getElementById('btn-save-project').addEventListener('click', saveProject);

// ── VIDEO BAR ─────────────────────────────────────────────────────
let currentVideo=null;
const videoBar=document.getElementById('video-bar');
const btnPP=document.getElementById('btn-playpause'), iPlay=document.getElementById('icon-play'), iPause=document.getElementById('icon-pause');
const scrubWrap=document.getElementById('scrubber-wrap'), scrubFill=document.getElementById('scrubber-fill'), scrubThumb=document.getElementById('scrubber-thumb');
const timeDsp=document.getElementById('time-display'), vidName=document.getElementById('video-name');
const volSlider=document.getElementById('vol-slider'), btnMute=document.getElementById('btn-mute'), iconVol=document.getElementById('icon-vol'), iconMuted=document.getElementById('icon-muted');
function showVideoBar(name,vid){ currentVideo=vid; vidName.textContent=name; videoBar.classList.add('visible'); volSlider.value=vid.muted?0:vid.volume; syncPlayIcon(); syncScrubber(); }
function hideVideoBar(){ videoBar.classList.remove('visible'); if(currentVideo){ currentVideo.pause(); currentVideo=null; } }
function syncPlayIcon(){ if(!currentVideo) return; iPlay.style.display=currentVideo.paused?'block':'none'; iPause.style.display=currentVideo.paused?'none':'block'; }
function fmt(s){ if(!isFinite(s)) return'0:00'; return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function syncScrubber(){ if(!currentVideo||!currentVideo.duration) return; const pct=(currentVideo.currentTime/currentVideo.duration)*100; scrubFill.style.width=pct+'%'; scrubThumb.style.left=pct+'%'; timeDsp.textContent=fmt(currentVideo.currentTime)+' / '+fmt(currentVideo.duration); }
btnPP.addEventListener('click',()=>{ if(!currentVideo) return; if(currentVideo.paused){ currentVideo.play().catch(()=>{ currentVideo.muted=true; currentVideo.play().then(()=>{ currentVideo.muted=(+volSlider.value===0); updateMuteIcon(); }); }); } else currentVideo.pause(); syncPlayIcon(); });
volSlider.addEventListener('input',e=>{ if(!currentVideo) return; currentVideo.volume=+e.target.value; currentVideo.muted=+e.target.value===0; updateMuteIcon(); });
btnMute.addEventListener('click',()=>{ if(!currentVideo) return; currentVideo.muted=!currentVideo.muted; volSlider.value=currentVideo.muted?0:currentVideo.volume; updateMuteIcon(); });
function updateMuteIcon(){ if(!currentVideo) return; const m=currentVideo.muted||currentVideo.volume===0; iconVol.style.display=m?'none':'block'; iconMuted.style.display=m?'block':'none'; }
let isScrubbing=false;
function seekAt(e){ if(!currentVideo||!currentVideo.duration) return; const r=scrubWrap.getBoundingClientRect(); currentVideo.currentTime=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*currentVideo.duration; syncScrubber(); }
scrubWrap.addEventListener('mousedown',e=>{ isScrubbing=true; seekAt(e); e.stopPropagation(); });
window.addEventListener('mousemove',e=>{ if(isScrubbing) seekAt(e); });
window.addEventListener('mouseup',()=>{ isScrubbing=false; });
document.addEventListener('play',syncPlayIcon,true); document.addEventListener('pause',syncPlayIcon,true);
document.addEventListener('ended',()=>{ syncPlayIcon(); syncScrubber(); },true);
document.addEventListener('timeupdate',()=>{ if(currentVideo&&!isScrubbing) syncScrubber(); },true);

// ── FILE HANDLING ─────────────────────────────────────────────────
function handleFile(file) {
  const ext=file.name.split('.').pop().toLowerCase();
  const name=file.name.replace(/\.[^/.]+$/,'');
  const url=URL.createObjectURL(file);
  if(ext==='obj'){ const r=new FileReader(); r.onload=ev=>loadOBJ(name,ev.target.result); r.readAsText(file); }
  else if(['jpg','jpeg','png','webp'].includes(ext)) loadImageTex(name,url);
  else if(['mp4','webm','mov'].includes(ext)) loadVideoTex(name,url);
  else if(ext==='enterspace') loadProject(file);
}
const overlay=document.getElementById('drop-overlay');
let dc=0;
viewport.addEventListener('dragenter',e=>{ e.preventDefault(); dc++; overlay.classList.add('active'); });
viewport.addEventListener('dragleave',()=>{ dc--; if(dc<=0){ dc=0; overlay.classList.remove('active'); } });
viewport.addEventListener('dragover',e=>e.preventDefault());
viewport.addEventListener('drop',e=>{ e.preventDefault(); dc=0; overlay.classList.remove('active'); Array.from(e.dataTransfer.files).forEach(handleFile); });
const fileInput=document.getElementById('file-input');
fileInput.addEventListener('change',()=>{ Array.from(fileInput.files).forEach(handleFile); fileInput.value=''; });

// ── CHANGE COLOR / CAPTURE ────────────────────────────────────────
document.getElementById('btn-color').addEventListener('click',()=>{
  if(!selectedObj){ showStatus('Select an object first'); return; }
  if(objects[selectedObj]?.isLED){ showStatus('LED mesh uses unlit material — color locked'); return; }
  document.getElementById('hidden-color').value=objects[selectedObj]?.baseColor||'#404044';
  document.getElementById('hidden-color').click();
});
document.getElementById('hidden-color').addEventListener('input',e=>{
  if(!selectedObj) return;
  objects[selectedObj].baseColor=e.target.value;
  objects[selectedObj].mesh.material.color.set(e.target.value);
  document.getElementById('color-swatch').style.background=e.target.value;
});
document.getElementById('btn-capture').addEventListener('click',()=>{
  renderer.render(scene,camera);
  const a=document.createElement('a'); a.download='capture_enterspace.png'; a.href=canvas.toDataURL('image/png'); a.click();
  showStatus('Captured!');
});

// ── STATUS ────────────────────────────────────────────────────────
let stTimer;
function showStatus(msg){ const el=document.getElementById('status'); el.textContent=msg; el.classList.add('visible'); clearTimeout(stTimer); stTimer=setTimeout(()=>el.classList.remove('visible'),2600); }

// ── RENDER LOOP ───────────────────────────────────────────────────
const VF_INTERVAL=1000/(parseInt(tv('--video-fps-cap'))||30);
let lastVF=0;
function animate(ts){
  requestAnimationFrame(animate);
  if(currentVideo&&!currentVideo.paused){
    const entry=Object.values(textures).find(t=>t.type==='video'&&t.videoEl===currentVideo);
    if(entry&&!entry.hasRVFC&&ts-lastVF>=VF_INTERVAL){ entry.tex.needsUpdate=true; lastVF=ts; }
  }
  renderer.render(scene,camera);
}
requestAnimationFrame(animate);

setProgress(100,'READY');
setTimeout(()=>document.getElementById('loading-screen').classList.add('hidden'),400);
showStatus('Ready — drag files onto viewport · ↓ SAVE to save project');
</script>
